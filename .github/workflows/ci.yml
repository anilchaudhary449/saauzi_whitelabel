name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo 'deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main' | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run tests
      run: pytest --tb=short --html=reports/report.html --self-contained-html

    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-html-report
        path: reports/report.html
        retention-days: 30

    - name: Send Discord Notification
      if: always()
      uses: tsickert/discord-webhook@v5.3.0
      with:
        webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
        content: |
          🧪 **Test Report** - ${{ github.repository }}
          
          **Status**: ${{ job.status == 'success' && '✅ PASSED' || '❌ FAILED' }}
          **Branch**: `${{ github.ref_name }}`
          **Commit**: `${{ github.sha }}`
          **Actor**: ${{ github.actor }}
          
          📊 [View Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          📥 [Download Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})