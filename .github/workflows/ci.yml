name: CI - Saauzi White Label

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2,10,15,22 * * *' # 2 AM, 10 AM, 3 PM, and 10 PM UTC

jobs:
  test-saauzi-white-label:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4.2.0

    - name: Set up Python
      uses: actions/setup-python@v5.1.0
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo 'deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main' | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run tests
      run: |
        mkdir -p reports
        pytest --tb=short --html=reports/report.html --self-contained-html

    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4.4.0
      with:
        name: pytest-html-report
        path: reports/report.html
        retention-days: 30

    # 🔔 Discord Notification with Report
    - name: Send Discord Notification with Report
      if: always()
      run: |
        # Prepare Discord message
        STATUS="${{ job.status }}"
        STATUS_EMOJI=$([ "$STATUS" == "success" ] && echo "✅" || echo "❌")
        COLOR=$([ "$STATUS" == "success" ] && echo "65280" || echo "16711680")
        
        # Send message with webhook
        curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🧪 Test Execution Report",
              "description": "Automated test suite results for **${{ github.repository }}**",
              "color": '$COLOR',
              "thumbnail": {
                "url": "https://img.shields.io/badge/Tests-'$STATUS'-'$([ "$STATUS" == "success" ] && echo "brightgreen" || echo "red")'.svg"
              },
              "fields": [
                {"name": "📊 Status", "value": "'$STATUS_EMOJI' **'$STATUS'**", "inline": true},
                {"name": "🌿 Branch", "value": "`${{ github.ref_name }}`", "inline": true},
                {"name": "🔗 Commit", "value": "`${{ github.sha }}`", "inline": true},
                {"name": "👤 Triggered by", "value": "[${{ github.actor }}](https://github.com/${{ github.actor }})", "inline": true},
                {"name": "⏰ Run Time", "value": "'$(date -u +"%Y-%m-%d %H:%M UTC")'", "inline": true},
                {"name": "🔍 Workflow", "value": "[View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
              ],
              "footer": {
                "text": "Saauzi White Label CI/CD",
                "icon_url": "https://github.com/actions.png"
              }
            }]
          }'
        
        # Upload report file to Discord
        if [ -f "reports/report.html" ]; then
          FILE_SIZE=$(stat -c%s "reports/report.html")
          echo "📊 Report file size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -gt 8000000 ]; then
            echo "⚠️ Report file is too large for Discord (8MB limit), skipping attachment"
            curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
              -H "Content-Type: application/json" \
              -d '{"content":"📊 **Report too large to attach (over 8MB)** - View artifact in GitHub Actions"}'
          else
            UPLOAD_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST ${{ secrets.DISCORD_WEBHOOK }} \
              -F "file=@reports/report.html" \
              -F "payload_json={\"content\":\"📊 **Detailed Test Report Attached**\"}")
            if echo "$UPLOAD_RESPONSE" | grep -q "HTTP_STATUS:200"; then
              echo "✅ Report uploaded successfully to Discord"
            else
              echo "❌ Failed to upload report to Discord"
              echo "Response: $UPLOAD_RESPONSE"
            fi
          fi
        else
          echo "❌ Report file not found at reports/report.html"
        fi

    # 🔔 Slack Notification with Report
    - name: Send Slack Notification with Report
      if: always()
      run: |
        # Send Slack message
        STATUS="${{ job.status }}"
        STATUS_TEXT=$([ "$STATUS" == "success" ] && echo "✅ PASSED" || echo "❌ FAILED")
        COLOR=$([ "$STATUS" == "success" ] && echo "good" || echo "danger")
        
        curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-Type: application/json' \
          -d '{
            "text": "🧪 *Test Execution Report*",
            "attachments": [
              {
                "pretext": "Automated test suite results for *${{ github.repository }}*",
                "color": "'$COLOR'",
                "title": "📊 Test Results",
                "title_link": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "fields": [
                  { "title": "Status", "value": "'$STATUS_TEXT'", "short": true },
                  { "title": "Branch", "value": "`${{ github.ref_name }}`", "short": true },
                  { "title": "Commit", "value": "`${{ github.sha }}`", "short": true },
                  { "title": "Triggered by", "value": "<https://github.com/${{ github.actor }}|${{ github.actor }}>", "short": true },
                  { "title": "Run Time", "value": "'$(date -u +"%Y-%m-%d %H:%M UTC")'", "short": true },
                  { "title": "Event", "value": "${{ github.event_name }}", "short": true }
                ],
                "footer": "Saauzi White Label CI/CD",
                "footer_icon": "https://github.com/favicon.ico",
                "ts": "'$(date +%s)'"
              }
            ]
          }'
        
        # Upload report file to Slack
        if [ -f "reports/report.html" ]; then
          FILE_SIZE=$(stat -c%s "reports/report.html")
          echo "📊 Report file size: $FILE_SIZE bytes"
          echo "📊 Uploading HTML report to Slack..."
          UPLOAD_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -F file=@reports/report.html \
            -F "initial_comment=📊 *Detailed Test Report Attached* from ${{ github.repository }}" \
            -F channels=${{ secrets.SLACK_CHANNEL_ID }} \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            https://slack.com/api/files.upload)
          
          # Check if upload was successful
          if echo "$UPLOAD_RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Report uploaded successfully to Slack"
          else
            echo "❌ Failed to upload report to Slack"
            echo "Response: $UPLOAD_RESPONSE"
          fi
        else
          echo "❌ Report file not found at reports/report.html"
        fi