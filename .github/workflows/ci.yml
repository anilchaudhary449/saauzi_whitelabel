name: CI - Saauzi White Label

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2,10,15,22 * * *' # 4 times daily

jobs:
  test-saauzi-white-label:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4.2.0

    - name: Set up Python
      uses: actions/setup-python@v5.1.0
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-html pytest-rerunfailures

    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo 'deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main' | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run tests (with retry + reports)
      run: |
        mkdir -p reports
        pytest \
          --tb=short \
          --reruns 2 \
          --reruns-delay 2 \
          --html=reports/report.html \
          --self-contained-html \
          --junitxml=reports/junit.xml

    - name: Detect Flaky Tests
      if: always()
      run: |
        if [ -f "reports/junit.xml" ] && grep -q "RERUN" reports/junit.xml; then
          echo "FLAKY=true" >> $GITHUB_ENV
          echo "⚠️ Flaky tests detected"
        else
          echo "FLAKY=false" >> $GITHUB_ENV
        fi

    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4.4.0
      with:
        name: pytest-html-report
        path: reports/
        retention-days: 30

    # 🔔 Discord Notification
    - name: Send Discord Notification with Report
      if: always()
      run: |
        STATUS="${{ job.status }}"
        STATUS_EMOJI=$([ "$STATUS" == "success" ] && echo "✅" || echo "❌")
        COLOR=$([ "$STATUS" == "success" ] && echo "65280" || echo "16711680")
        BADGE_COLOR=$([ "$STATUS" == "success" ] && echo "brightgreen" || echo "red")
        RUN_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")

        FLAKY_MSG=""
        if [ "${FLAKY}" == "true" ]; then
          FLAKY_MSG="⚠️ Flaky tests detected\n"
        fi

        PAYLOAD=$(cat <<EOF
        {
          "embeds": [{
            "title": "🧪 Test Execution Report",
            "description": "${FLAKY_MSG}Automated test suite results for **${{ github.repository }}**",
            "color": $COLOR,
            "thumbnail": {
              "url": "https://img.shields.io/badge/tests-$STATUS-$BADGE_COLOR.svg"
            },
            "fields": [
              {"name": "📊 Status", "value": "$STATUS_EMOJI **$STATUS**", "inline": true},
              {"name": "🌿 Branch", "value": "\`${{ github.ref_name }}\`", "inline": true},
              {"name": "🔗 Commit", "value": "\`${{ github.sha }}\`", "inline": true},
              {"name": "👤 Actor", "value": "${{ github.actor }}", "inline": true},
              {"name": "⏰ Run Time", "value": "$RUN_TIME", "inline": true},
              {"name": "🔍 Workflow", "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}", "inline": false}
            ],
            "footer": {
              "text": "Saauzi White Label CI/CD",
              "icon_url": "https://github.com/actions.png"
            }
          }]
        }
        EOF
        )

        curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" || echo "⚠️ Discord notification failed"

        # Upload report (check size)
        if [ -f "reports/report.html" ]; then
          FILE_SIZE=$(stat -c%s "reports/report.html")
          if [ "$FILE_SIZE" -lt 8000000 ]; then
            curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} \
              -F "file=@reports/report.html" \
              -F "payload_json={\"content\":\"📊 Detailed Test Report Attached\"}" \
              || echo "⚠️ Discord file upload failed"
          else
            echo "⚠️ Report too large for Discord"
          fi
        fi

    # 🔔 Slack Notification
    - name: Send Slack Notification with Report
      if: always()
      run: |
        STATUS="${{ job.status }}"
        STATUS_TEXT=$([ "$STATUS" == "success" ] && echo "✅ PASSED" || echo "❌ FAILED")
        COLOR=$([ "$STATUS" == "success" ] && echo "#2eb886" || echo "#e01e5a")
        RUN_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")

        FLAKY_TEXT=""
        if [ "${FLAKY}" == "true" ]; then
          FLAKY_TEXT="⚠️ *Flaky tests detected!*\n"
        fi

        PAYLOAD=$(cat <<EOF
        {
          "blocks": [
            {
              "type": "header",
              "text": { "type": "plain_text", "text": "🧪 Test Execution Report" }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "${FLAKY_TEXT}*Repo:* ${{ github.repository }}"
              }
            },
            {
              "type": "section",
              "fields": [
                { "type": "mrkdwn", "text": "*Status:*\n$STATUS_TEXT" },
                { "type": "mrkdwn", "text": "*Branch:*\n\`${{ github.ref_name }}\`" },
                { "type": "mrkdwn", "text": "*Actor:*\n${{ github.actor }}" },
                { "type": "mrkdwn", "text": "*Event:*\n${{ github.event_name }}" },
                { "type": "mrkdwn", "text": "*Run Time:*\n$RUN_TIME" }
              ]
            },
            {
              "type": "actions",
              "elements": [
                {
                  "type": "button",
                  "text": { "type": "plain_text", "text": "View Workflow" },
                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              ]
            }
          ]
        }
        EOF
        )

        curl -s -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" || echo "⚠️ Slack notification failed"

        # Upload report to Slack
        if [ -f "reports/report.html" ] && [ -n "${{ secrets.SLACK_BOT_TOKEN }}" ]; then
          curl -s -F file=@reports/report.html \
            -F "initial_comment=📊 Detailed Test Report" \
            -F channels=${{ secrets.SLACK_CHANNEL_ID }} \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            https://slack.com/api/files.upload \
            || echo "⚠️ Slack file upload failed"
        fi